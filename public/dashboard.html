<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Agency | Strategic Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f1218; color: #e2e8f0; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); border-color: rgba(96, 165, 250, 0.5); box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3); }
        .sidebar { border-right: 1px solid rgba(255,255,255,0.05); }
        .agent-pulse { width: 10px; height: 10px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body class="min-h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-72 sidebar glass flex flex-col p-8 space-y-10">
        <div>
            <h1 class="serif text-3xl italic font-bold text-white tracking-tight">Nexus OS</h1>
            <p class="text-xs text-blue-400 font-semibold tracking-widest uppercase mt-2">Strategic Agency</p>
        </div>

        <nav class="flex-1 space-y-4">
            <a href="#" class="flex items-center space-x-4 text-white bg-blue-600/20 p-3 rounded-xl border border-blue-500/30">
                <i class="fas fa-th-large"></i>
                <span class="font-medium">Projects</span>
            </a>
            <a href="#" class="flex items-center space-x-4 text-gray-400 p-3 hover:text-white transition">
                <i class="fas fa-robot"></i>
                <span class="font-medium">Agents</span>
            </a>
            <a href="#" class="flex items-center space-x-4 text-gray-400 p-3 hover:text-white transition">
                <i class="fas fa-file-invoice"></i>
                <span class="font-medium">Artifacts</span>
            </a>
        </nav>

        <div class="pt-10 border-t border-white/5 space-y-4">
            <div class="flex items-center justify-between">
                <span class="text-xs text-gray-400 uppercase font-bold px-1 tracking-widest">System Health</span>
                <div class="agent-pulse"></div>
            </div>
            <div class="text-xs text-gray-500 bg-white/5 p-4 rounded-xl">
                Meta API: <span class="text-green-400">ONLINE</span><br>
                Jarvis Brain: <span class="text-blue-400">ACTIVE</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-12 space-y-12">
        <header class="flex justify-between items-center">
            <div>
                <h2 class="text-gray-400 text-sm font-bold uppercase tracking-widest">Performance Dashboard</h2>
                <h3 class="serif text-4xl text-white mt-2">Active Projects</h3>
            </div>
            <button class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-semibold shadow-lg shadow-blue-500/30 transition-all flex items-center space-x-2">
                <i class="fas fa-plus"></i>
                <span>Initialize Goal</span>
            </button>
        </header>

        <!-- Project Board Overlay (Mock) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Column: Planning -->
            <div class="space-y-6">
                <div class="flex items-center space-x-2 text-gray-500 font-bold text-xs uppercase tracking-widest px-2">
                    <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                    <span>Planning</span>
                </div>
                <div id="planning-tasks" class="space-y-4">
                    <!-- Dynamic Content -->
                </div>
            </div>

            <!-- Column: In Progress -->
            <div class="space-y-6">
                <div class="flex items-center space-x-2 text-gray-500 font-bold text-xs uppercase tracking-widest px-2">
                    <div class="w-2 h-2 rounded-full bg-amber-500"></div>
                    <span>In Progress</span>
                </div>
                <div id="active-tasks" class="space-y-4">
                    <!-- Dynamic Content -->
                </div>
            </div>

            <!-- Column: Completed -->
            <div class="space-y-6">
                <div class="flex items-center space-x-2 text-gray-500 font-bold text-xs uppercase tracking-widest px-2">
                    <div class="w-2 h-2 rounded-full bg-green-500"></div>
                    <span>Achieved</span>
                </div>
                <div id="completed-tasks" class="space-y-4">
                    <!-- Dynamic Content -->
                </div>
            </div>
        </div>
    </main>

    <script>
        async function loadContent() {
            const planning = document.getElementById('planning-tasks');
            const active = document.getElementById('active-tasks');
            const completed = document.getElementById('completed-tasks');
            
            try {
                const projects = await fetch('/api/projects').then(res => res.json());
                if (projects.length === 0) {
                    planning.innerHTML = '<p class="text-xs text-gray-500 p-4">Waiting for initial goal...</p>';
                    return;
                }
                
                const project = projects[0]; // Show latest project
                const tasks = await fetch(`/api/tasks/${project.id}`).then(res => res.json());
                
                planning.innerHTML = ''; active.innerHTML = ''; completed.innerHTML = '';
                
                tasks.forEach(task => {
                    const html = `
                        <div class="card glass p-6 rounded-2xl space-y-4 border-l-4 ${task.status === 'completed' ? 'border-green-500' : task.status === 'running' ? 'border-amber-500' : 'border-blue-500'}">
                            <h4 class="font-bold text-white">${task.title}</h4>
                            <p class="text-sm text-gray-400">${task.description}</p>
                            <div class="flex items-center justify-between pt-2">
                                <span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded font-bold uppercase">${task.role}</span>
                                <span class="text-[10px] text-gray-500 font-mono italic underline">${task.status}</span>
                            </div>
                        </div>
                    `;
                    if (task.status === 'completed') completed.innerHTML += html;
                    else if (task.status === 'running') active.innerHTML += html;
                    else planning.innerHTML += html;
                });
            } catch (e) {
                console.error("Dashboard Sync Error:", e);
            }
        }
        setInterval(loadContent, 3000);
        loadContent();
    </script>
</body>
</html>
